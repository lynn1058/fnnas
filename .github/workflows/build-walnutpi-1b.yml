name: build-walnutpi-1b

#================================================================================================
#
# 核桃派 1B 专用 FnNAS 镜像构建工作流
#
# 触发条件:
#   1) push 到 main 分支
#   2) 手动 workflow_dispatch 触发
#
# 产物:
#   - fnnas_<...>_walnutpi-1b.img (从 renas 的 out/ 目录上传)
#
#================================================================================================

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      kernel:
        description: 'Kernel series (e.g. 6.18.y)'
        required: false
        default: '6.18.y'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache fnos base image
        id: cache-fnos
        uses: actions/cache@v5
        with:
          path: fnnas-arm64/fnos_arm_*.img
          key: fnos-base-v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $(cat make-fnnas/script/ubuntu2404-make-fnnas-depends 2>/dev/null) \
            p7zip-full wget curl xz-utils

      - name: Prepare base fnos image
        if: steps.cache-fnos.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p fnnas-arm64
          cd fnnas-arm64
          # 注意:这里不能用反引号,直接写完整 URL
          wget --show-progress \
            "https://github.com/ophub/fnnas/releases/download/fnnas_base_image/fnnas-official-arm64-image_allwinner_1254.img.xz" \
            -O fnos_arm.img.xz
          echo "===== 下载完成,开始解压 ====="
          ls -la
          xz -d -f fnos_arm.img.xz
          ls -la
          echo "===== 解压后目录 ====="
          echo "当前目录: $(pwd)"
          ls -la $GITHUB_WORKSPACE/fnnas-arm64/ 2>/dev/null || echo "not found at $GITHUB_WORKSPACE/fnnas-arm64/"
      - name: Pre-build check
        working-directory: ${{ github.workspace }}
        run: |
          # 之前的调试代码
          echo "===== 仓库 model_database.conf 里 w208 行原始 ====="
          grep "w208" "make-fnnas/fnnas-files/common-files/etc/model_database.conf" | cat -A
          echo ""
          echo "===== w208 行字段数 ====="
          grep "w208" "make-fnnas/fnnas-files/common-files/etc/model_database.conf" | awk -F':' '{print NF}'
          echo ""
          echo "===== w208 行 clean_model_conf 后模拟 ====="
          grep "w208" "make-fnnas/fnnas-files/common-files/etc/model_database.conf" | sed -e 's/NA//g' -e 's/NULL//g' -e 's/[ ][ ]*//g' | cat -A
          echo ""
          echo "===== w208 行 clean_model_conf 后字段数 ====="
          grep "w208" "make-fnnas/fnnas-files/common-files/etc/model_database.conf" | sed -e 's/NA//g' -e 's/NULL//g' -e 's/[ ][ ]*//g' | awk -F':' '{print NF}'
          echo ""
          echo "===== 用 make_board=allwinner 模拟完整 grep ====="
          grep "w208" "make-fnnas/fnnas-files/common-files/etc/model_database.conf" | sed -e 's/NA//g' -e 's/NULL//g' -e 's/[ ][ ]*//g' | grep -E "^.*:allwinner:.*:yes$" | head -3
          # 关键: 修改 renas 支持 tab
          echo "===== 修改 renas 的 clean_model_conf 让它支持 tab ====="
          sed -i "s/'s/$$ $$$$ $$\*//g'/'s/[ \\t][ \\t]*//g'/" renas
          echo "===== 修改后的 clean_model_conf ====="
          grep "clean_model_conf" renas | head -5
          echo "===== 重新测试 ====="
          grep "w208" "make-fnnas/fnnas-files/common-files/etc/model_database.conf" | sed -e 's/NA//g' -e 's/NULL//g' -e 's/[ \t][ \t]*//g' | grep -E "^.*:allwinner:.*:yes$" | head -3
      - name: Build WalnutPi-1B image via renas
        env:
          KERNEL: ${{ github.event.inputs.kernel || '6.18.y' }}
          KERNEL_TAGS: "allwinner"
        working-directory: ${{ github.workspace }}
        run: |
          # 强制导出 KERNEL_TAGS
          export KERNEL_TAGS="allwinner"
          echo "KERNEL_TAGS=${KERNEL_TAGS}"
          
          # ===== 关键调试 =====
          echo "PWD: $(pwd)"
          echo "make_path: ${PWD}/fnnas"
          echo "resource_path: ${PWD}/make-fnnas"
          echo ""
          echo "===== 仓库 model_database.conf ====="
          ls -la "make-fnnas/fnnas-files/common-files/etc/model_database.conf"
          echo "仓库 conf 里 w208 行数:"
          grep -c "w208" "make-fnnas/fnnas-files/common-files/etc/model_database.conf" || echo "仓库 conf 里没有 w208"
          echo ""
          echo "===== fnnas/ 临时目录下的 model_database.conf ====="
          find "fnnas" -name "model_database.conf" 2>/dev/null
          
          chmod +x renas
          echo "===== 检查 renas 里 OUT 路径定义 ====="
          grep -n -E "OUT|out/" renas | head -30
          echo "===== 检查所有 .img 镜像 (含大写) ====="
          find . -iname "*walnutpi*" 2>/dev/null
          find . -iname "fnnas_*arm64*.img" 2>/dev/null | head -20
          echo "===== 查 .gz 包 ====="
          find . -name "*.img.gz" 2>/dev/null | head -20
          echo "===== 仓库根目录所有大文件 ====="
          find . -type f -size +100M 2>/dev/null
          echo "===== 开始编译 ====="
          sudo -E env KERNEL_TAGS="allwinner" ./renas -b WalnutPi-1B -k "${KERNEL}" -n "github-ci"
          echo "===== 编译后再查一遍 ====="
          find . -iname "*walnutpi*" 2>/dev/null
          find . -iname "fnnas_*arm64*.img" 2>/dev/null | head -20
          echo "===== 各可能输出目录 ====="
          ls -la out/ 2>/dev/null || echo "no out/"
          ls -la fnnas/out/ 2>/dev/null || echo "no fnnas/out/"
          ls -la make-fnnas/out/ 2>/dev/null || echo "no make-fnnas/out/"
      - name: Verify WalnutPi-1B dtb is embedded
        working-directory: ${{ github.workspace }}
        run: |
          # 产物在 fnnas/out/ 且是 .img.gz
          IMG_GZ=$(ls fnnas/out/fnnas_*WalnutPi-1B*.img.gz 2>/dev/null | head -n1)
          if [[ -z "${IMG_GZ}" ]]; then
            echo "ERROR: 未找到 walnutpi-1b 镜像" >&2
            echo "===== fnnas/out 目录 =====" >&2
            ls -la fnnas/out/ >&2 || echo "fnnas/out 不存在" >&2
            exit 1
          fi
          echo "镜像(压缩): ${IMG_GZ}"
          # 解压到临时目录
          WORK_DIR=$(mktemp -d)
          cp "${IMG_GZ}" "${WORK_DIR}/"
          cd "${WORK_DIR}"
          7z x -y "$(basename ${IMG_GZ})" > /dev/null
          IMG=$(ls *.img | head -n1)
          echo "镜像(解压): ${IMG}"
          cd - > /dev/null
          # 用 losetup 挂载 BOOTFS 验证
          LOOP=$(sudo losetup -fP --show "${WORK_DIR}/${IMG}")
          sleep 3
          sudo mount -o ro "${LOOP}p1" /mnt 2>/dev/null || sudo mount "${LOOP}p1" /mnt
          echo "===== BOOTFS 内容 ====="
          ls /mnt/dtb/allwinner/ | grep -i walnutpi | head -10
          echo "===== armbianEnv.txt ====="
          cat /mnt/armbianEnv.txt
          echo "===== 验证关键 DTB ====="
          ls -la /mnt/dtb/allwinner/sun50i-h616-walnutpi-1b.dtb
          sudo umount /mnt
          sudo losetup -d "${LOOP}"
          # 清理
          rm -rf "${WORK_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: fnnas-walnutpi-1b
          # 注意:fnnas/out/ 下的大写 WalnutPi-1B,.img.gz
          path: fnnas/out/fnnas_*WalnutPi-1B*.img.gz
          if-no-files-found: error
          retention-days: 14

      - name: Optional create draft release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: walnutpi-1b-${{ github.run_number }}
          name: "FnNAS WalnutPi-1B build ${{ github.run_number }}"
          draft: true
          files: |
            fnnas/out/fnnas_*WalnutPi-1B*.img.gz
          body: |
            自动构建的核桃派 1B 专用 FnNAS 镜像

            - 内核: ${{ github.event.inputs.kernel || '6.18.y' }}
            - commit: ${{ github.sha }}
            - workflow: ${{ github.workflow }} #${{ github.run_number }}

            烧录:
            ```
